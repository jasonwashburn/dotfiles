# Terminal true color support
# terminal-features is the modern tmux (3.2+) way to declare RGB color support
# ghostty: covers local Ghostty sessions (TERM=ghostty)
# xterm-256color: covers SSH and remote
set-option -sa terminal-features ',ghostty:RGB'
set-option -sa terminal-features ',xterm-256color:RGB'

set -g mouse on

# Copy mode vi goodness
set-window-option -g mode-keys vi 
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Set prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Bind alt-1 thru alt-5 to switch to windows 1 thru 5
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5

# Reload shortcut
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Fixes issue with <escape> key in vim
set -s escape-time 0

# TPM - Tmux Plugin Manager
# Install on new machine with:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then inside tmux press prefix + I (Ctrl-a + I) to install plugins
# To update plugins: prefix + U
# To remove unlisted plugins: prefix + alt + u
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# vim-tmux-navigator - seamless navigation between tmux panes and neovim splits
# Requires corresponding neovim plugin (christoomey/vim-tmux-navigator or lazy equiv)
# ctrl-h/j/k/l to move between panes/splits
set -g @plugin 'christoomey/vim-tmux-navigator'

# tmux-fingers - hint-based text picker (prefix + F to activate)
# Installed via wizard (requires Crystal or brew)
# In fingers mode:
#   a-z        : copy match to clipboard
#   Ctrl + a-z : copy + open (URLs in browser, files in Finder)
#   Shift + a-z: copy + paste directly
#   Alt + a-z  : copy + custom action (configurable via @fingers-alt-action)
#   Tab        : toggle multi-select mode, Tab again to copy all selected
#   q/Esc/C-c  : exit fingers mode
set -g @plugin 'Morantron/tmux-fingers'
set -g @fingers-show-copied-notification 1
set -g @fingers-highlight-style "fg=magenta"
set -g @fingers-hint-style "fg=green,bold"

# Set theme
set -g @plugin 'dracula/tmux'
set -g @dracula-plugins 'cwd cpu-usage ram-usage battery'
set -g @dracula-plugins 'cwd kubernetes-context cpu-usage ram-usage battery'
set -g @dracula-kubernetes-context-label "☸ "
set -g @dracula-kubernetes-eks-hide-arn true
set -g @dracula-kubernetes-hide-user true
set -g @dracula-show-left-icon 🦄
set -g @dracula-cpu-display-load true
set -g @dracula-show-powerline true
set -g @dracula-cwd-colors "light_purple dark_gray"
set -g @dracula-show-flags true
set -g @dracula-cwd-max-chars "60"

# Set window numbering to start at 1 instead of 0
set -g base-index 1

# NOTE: run tpm last - must be at bottom of config
run '~/.tmux/plugins/tpm/tpm'
