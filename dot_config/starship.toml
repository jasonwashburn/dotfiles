"$schema" = 'https://starship.rs/config-schema.json'

format = """
$all\
$kubernetes\
$line_break\
$character"""

[aws]
format = 'on [$symbol($profile )(\($region\) )]($style)'
symbol = '󰸏 '
 
[aws.profile_aliases]
# Add your real profile-name → short-label mappings here
# production-admin  = 'prod'
# staging-admin     = 'stg'
# sandbox-developer = 'sbx'
 
[aws.region_aliases]
us-east-1 = 'use1'
us-east-2 = 'use2'
us-west-1 = 'usw1'
us-west-2 = 'usw2'
us-gov-west-1 = 'gov-west'
us-gov-east-1 = 'gov-east'

[azure]
disabled = false
format = 'on [$symbol($subscription)]($style) '
symbol = '󰠅 '
style = 'blue bold'

[cmd_duration]
min_time = 2_000
style = 'bold #f1fa8c'
format = 'took [$duration]($style) '

[gcloud]
symbol = '󰊭 '

[git_branch]
truncation_length = 24
truncation_symbol = '…'
 
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = '⚔️ '
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
untracked = '?${count}'
stashed = '📦'
modified = '!${count}'
staged = '+${count}'
renamed = '»${count}'
deleted = '✘${count}'

[hostname]
aliases = { "lima-ai-sandbox" = "🤖 sandbox" }

[kubernetes]
disabled = false
symbol = '☸ '
style = 'bold cyan'
format = '[$symbol$context]($style) '

[[kubernetes.contexts]]
context_pattern = ".*uds-eks-prod.*"
style = "bold red"
symbol = "🚨"
context_alias = "Registry Production Cluster"

[[kubernetes.contexts]]
context_pattern = ".*uds-eks-staging.*"
style = "bold yellow"
symbol = "⚠️ "
context_alias = "Registry Staging Cluster"

[[kubernetes.contexts]]
context_pattern = ".*uds-eks-dev.*"
style = "bold green"
context_alias = "Registry Dev Cluster"
